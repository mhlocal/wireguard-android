name: Build VPN APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0 # Code ရာဇဝင်တစ်ခုလုံးကို ဆွဲယူရန်

      - name: Force Initialize Git Submodules
        run: |
          # Submodules တွေကို အတင်းအကျပ် အသစ်ပြန်ဆွဲယူခြင်း
          git submodule sync
          git submodule update --init --recursive --force

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # (၁) Release APK ကို Build လုပ်ခြင်း
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 🌟 (၂) Plugin အဟောင်းကို မသုံးတော့ဘဲ Android ၏ မူလ Tools များဖြင့် တိုက်ရိုက် Sign လုပ်ခြင်း 🌟
      - name: Sign APK Manually
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          # Keystore ဖိုင်ကို ပြန်လည်တည်ဆောက်ခြင်း
          echo "$KEYSTORE_BASE64" | base64 --decode > my-release.keystore
          
          # စက်ထဲရှိ နောက်ဆုံးပေါ် Build Tools ကို အလိုအလျောက် ရှာဖွေခြင်း
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # Build ထားသော Unsigned APK ဖိုင်ကို ရှာဖွေခြင်း
          APK_PATH=$(find ui/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK: $APK_PATH"
          
          # Zipalign ဖြင့် APK ကို သေသပ်အောင် စီစဉ်ခြင်း
          $BUILD_TOOLS_PATH/zipalign -v -p 4 "$APK_PATH" MH-VPN-Signed.apk
          
          # Apksigner ဖြင့် လုံခြုံစွာ လက်မှတ်ထိုးခြင်း
          $BUILD_TOOLS_PATH/apksigner sign --ks my-release.keystore --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$STORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" MH-VPN-Signed.apk

      # (၃) Sign လုပ်ပြီးသား Official APK ကို Download ရယူနိုင်ရန် တင်ပေးခြင်း
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: MH-VPN-Signed-Release
          path: MH-VPN-Signed.apk
          retention-days: 3
