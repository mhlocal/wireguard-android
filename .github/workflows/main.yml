name: Build VPN APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0 

      - name: Force Initialize Git Submodules
        run: |
          git submodule sync
          git submodule update --init --recursive --force

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ဒီနေရာမှာ ဖုန်းရော TV ပါ နှစ်မျိုးစလုံးကို ခွဲထုတ်ခိုင်းပါမည်
      - name: Build Mobile and TV Debug APKs
        run: |
          ./gradlew assembleMobileDebug
          ./gradlew assembleTvDebug

      # ထွက်လာတဲ့ APK ၂ ခုစလုံးကို တင်ပေးပါမည်
      - name: Upload APKs as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPN-App-Debug-Builds
          path: ui/build/outputs/apk/**/*.apk # TV ရော Mobile ရော ပါဝင်ရန် ** ကို သုံးထားပါသည်
          retention-days: 3
